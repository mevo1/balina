<div class="card shadow-sm mb-4">
    <div class="card-header bg-success text-white">
        <h5 class="mb-0">Coinler</h5>
    </div>
    <div class="card-body">
        <form id="coins-form">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="bitcoin" value="Bitcoin">
                <label class="form-check-label" for="bitcoin">Bitcoin</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="etheryum" value="Etheryum">
                <label class="form-check-label" for="etheryum">Etheryum</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="pepe" value="Pepe">
                <label class="form-check-label" for="pepe">Pepe</label>
            </div>
        </form>
    </div>
</div>
